<script>
// ---- IndexedDB Image Store ----
const DB_NAME = 'POD_ImageDB', DB_VER = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('images')) {
        db.createObjectStore('images', {keyPath:'sku'});
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => reject(e.target.error);
  });
}

function saveImageToDB(sku, blob, productType) {
  if (!db || productType === 'Customization') return; // Only persist Standard/Accessories
  return new Promise((resolve) => {
    const tx = db.transaction('images','readwrite');
    tx.objectStore('images').put({sku, blob, productType, savedAt: Date.now()});
    tx.oncomplete = () => resolve();
    tx.onerror = () => resolve(); // ignore dupes
  });
}

function loadAllFromDB() {
  return new Promise((resolve) => {
    if (!db) { resolve({}); return; }
    const tx = db.transaction('images','readonly');
    const req = tx.objectStore('images').getAll();
    req.onsuccess = () => {
      const map = {};
      for (const r of req.result) {
        map[r.sku] = URL.createObjectURL(r.blob);
      }
      resolve(map);
    };
    req.onerror = () => resolve({});
  });
}

function clearDB() {
  return new Promise((resolve) => {
    if (!db) { resolve(); return; }
    const tx = db.transaction('images','readwrite');
    tx.objectStore('images').clear();
    tx.oncomplete = () => resolve();
  });
}

// ---- Global State ----
let allRows = [];
let waveMap = {};
let imageCache = {};       // {skuName: blobUrl} — merged: DB persistence + current uploads
let skuTypes = {};         // {skuName: productType} — from Excel
let labelCache = {};       // {orderNo: dataUrl} — PDF shipping labels (pre-converted for print)
let printedSet = {};       // {orderNo: true} —订单已打印（存localStorage）
let currentWave = null;
let scanner = null;
try { printedSet = JSON.parse(localStorage.getItem('riichain_printed')||'{}'); } catch(e) { printedSet = {}; }
function savePrinted() { localStorage.setItem('riichain_printed', JSON.stringify(printedSet)); }

// ---- Drag & Drop ----
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.name.match(/\.xlsx?$/i)) {
    processExcel(file);
  }
});

// ---- Excel Import ----
function importExcel(input) {
  const file = input.files[0];
  if (!file) return;
  if (typeof XLSX === 'undefined') {
    alert('Excel 解析库(XLSX)未加载。请检查网络连接后刷新页面重试。');
    return;
  }
  processExcel(file);
}

function processExcel(file) {
  console.log('Processing Excel:', file.name, file.size, 'bytes');
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, {header:1});
      if (data.length < 2) { alert('Excel 文件为空'); return; }

      // ---- Build column index map from header row (position-independent) ----
      const headerRow = data[0];
      const colMap = {}; // {fieldName: columnIndex}
      const fieldPatterns = {
        orderNo:     ['Outbound Order No', '出库单号', '订单号', 'Order No'],
        waveNo:      ['Wave No.', '波次号', '关联波次号', 'Wave'],
        trackingNo:  ['Tracking No.', '快递单号', '运单号', 'Tracking'],
        sku:         ['SKU', 'sku', 'Sku'],
        qty:         ['Outbound Qty', '出库数量', '数量', 'Qty', 'Quantity'],
        productType: ['Product Type', '产品分类', '产品类型', 'Type', 'Category'],
      };

      for (let c = 0; c < headerRow.length; c++) {
        const hdr = String(headerRow[c] || '').trim();
        for (const [field, patterns] of Object.entries(fieldPatterns)) {
          if (patterns.some(p => hdr.includes(p))) {
            colMap[field] = c;
            break;
          }
        }
      }
      console.log('Column map:', colMap);

      const get = (row, field) => {
        const idx = colMap[field];
        return idx !== undefined && idx < row.length ? String(row[idx] || '').trim() : '';
      };

      allRows = [];
      skuTypes = {};
      for (let i = 1; i < data.length; i++) {
        const row = data[i];
        const orderNo = get(row, 'orderNo');
        const waveNo  = get(row, 'waveNo');
        if (!orderNo || !waveNo) continue;
        const sku   = get(row, 'sku');
        const pType = get(row, 'productType') || 'Standard';
        allRows.push({
          orderNo: orderNo,
          waveNo: waveNo,
          trackingNo: get(row, 'trackingNo'),
          sheetUrl: get(row, 'sheetUrl') || '',
          sku: sku,
          qty: parseInt(get(row, 'qty')) || 0,
          productType: pType
        });
        skuTypes[sku] = pType;
      }

      buildWaveMap();

      // Auto-load persisted images from IndexedDB
      loadAllFromDB().then(persisted => {
        let persistedCount = 0, neededCount = 0;
        const neededSkus = new Set();
        for (const r of allRows) {
          if (persisted[r.sku]) {
            imageCache[r.sku] = persisted[r.sku];
            persistedCount++;
          } else {
            neededSkus.add(r.sku);
            neededCount++;
          }
        }
        // Count by type
        const stdNeeded = [...neededSkus].filter(s => skuTypes[s] !== 'Customization').length;
        const custNeeded = [...neededSkus].filter(s => skuTypes[s] === 'Customization').length;

        document.getElementById('data-status').innerHTML =
          `<span class="status-badge status-found">${allRows.length} rows · ${Object.keys(waveMap).length} waves</span>`;
        let msg = `✅ ${allRows.length}行 · ${Object.keys(waveMap).length}Wave`;
        if (persistedCount > 0) msg += ` · 📷 图库命中 ${persistedCount} 张`;
        if (neededCount > 0) {
          msg += ` · ⚠️ 缺 ${neededCount} 张`;
          if (stdNeeded > 0) msg += ` (Standard/Accessories ${stdNeeded})`;
          if (custNeeded > 0) msg += ` (Customization ${custNeeded})`;
          msg += ' — 请上传图库';
        } else {
          msg += ' · ✅ 图片齐全';
        }
        document.getElementById('import-status').textContent = msg;

        const waves = Object.keys(waveMap).sort();
        if (waves.length > 0) {
          document.getElementById('wave-input').value = waves[0];
          searchWave();
        }
      });
    } catch(err) {
      alert('Excel 解析失败: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function buildWaveMap() {
  waveMap = {};
  for (const r of allRows) {
    if (!waveMap[r.waveNo]) {
      waveMap[r.waveNo] = {orders: new Set(), totalQty: 0, rows: []};
    }
    waveMap[r.waveNo].orders.add(r.orderNo);
    waveMap[r.waveNo].totalQty += r.qty;
    waveMap[r.waveNo].rows.push(r);
  }
}

// ---- Image Loading ----
function loadImages(input) {
  const files = Array.from(input.files);
  console.log('Loading', files.length, 'images');
  let loaded = 0, savedToDB = 0;
  for (const f of files) {
    const name = f.name.replace(/\.[^.]+$/, '');
    const blobUrl = URL.createObjectURL(f);
    imageCache[name] = blobUrl;
    loaded++;
    // Auto-save Standard/Accessories to persistent DB
    const pType = skuTypes[name] || '';
    if (pType === 'Standard' || pType === 'Accessories') {
      saveImageToDB(name, f, pType).then(() => { savedToDB++; });
    }
  }
  let msg = `🖼️ 已加载 ${loaded} 张`;
  if (savedToDB > 0) msg += ` · 💾 已保存 ${savedToDB} 张到图库数据库`;
  document.getElementById('import-status').textContent = msg;
  if (currentWave) renderWave(currentWave);
}

// ---- Wave Search ----
async function searchWave() {
  const input = document.getElementById('wave-input').value.trim();
  if (!input) return;

  // 1. 先在已加载数据中查找
  const foundKey = Object.keys(waveMap).find(k => k.toLowerCase() === input.toLowerCase());
  if (foundKey) {
    currentWave = foundKey;
    renderWave(foundKey);
    return;
  }

  // 2. 未找到 → 自动从 WMS 加载
  document.getElementById('import-status').textContent = '☁️ 正在从领星WMS拉取...';
  try {
    const r = await fetch('https://api.swaner.vip/wave-detail', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({waveNo: input})
    });
    if (!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    const rawData = data.data || data;
    const details = rawData.details || [];

    if (!details.length) {
      document.getElementById('import-status').textContent = '';
      document.getElementById('summary-row').innerHTML = `<div class="summary-card"><div class="val" style="color:var(--red);">?</div><div class="lbl">WMS 无此波次</div></div>`;
      document.getElementById('content-area').innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>WMS 未找到: <strong>${input}</strong></p></div>`;
      return;
    }

    // 合并到 allRows
    for (const d of details) {
      const orderNo = d.orderNo || '';
      const sku = d.sku || '';
      const pType = d.productType || 'Product';
      const qty = parseInt(d.qty) || 1;
      const trackingNo = d.trackingNo || '';
      allRows.push({ orderNo, waveNo: input, trackingNo, sku, qty, productType: pType, sheetUrl: d.sheetUrl || '' });
      skuTypes[sku] = pType;
    }

    buildWaveMap();
    document.getElementById('import-status').textContent = `☁️ WMS: ${details.length}行 · ${Object.keys(waveMap).length}Wave`;

    // 先加载 IndexedDB 图片缓存，再渲染
    loadAllFromDB().then(persisted => {
      let hitCount = 0;
      for (const r of allRows) {
        if (!imageCache[r.sku] && persisted[r.sku]) {
          imageCache[r.sku] = persisted[r.sku];
          hitCount++;
        }
      }
      document.getElementById('data-status').innerHTML = `<span class="status-badge status-found">${allRows.length} rows · ${Object.keys(waveMap).length} waves</span>`;

      // 再查找并渲染
      const refoundKey = Object.keys(waveMap).find(k => k.toLowerCase() === input.toLowerCase());
      if (refoundKey) {
        currentWave = refoundKey;
        renderWave(refoundKey);
      }
    });
  } catch(e) {
    document.getElementById('import-status').textContent = '';
    document.getElementById('summary-row').innerHTML = `<div class="summary-card"><div class="val" style="color:var(--red);">!</div><div class="lbl">加载失败</div></div>`;
    document.getElementById('content-area').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>WMS 加载失败: ${e.message}</p><p style="font-size:12px;">请检查网络连接</p></div>`;
  }
}

function renderWave(waveNo) {
  const wm = waveMap[waveNo];
  if (!wm) return;

  const orderCount = wm.orders.size;

  // Build order→SKUs mapping
  const orderMap = {};
  for (const r of wm.rows) {
    if (!orderMap[r.orderNo]) orderMap[r.orderNo] = [];
    orderMap[r.orderNo].push({sku:r.sku, qty:r.qty, productType:r.productType});
  }

  // Sort each order's SKUs: Accessories first, then others
  for (const orderNo of Object.keys(orderMap)) {
    orderMap[orderNo].sort(function(a,b){
      if (a.productType==='Accessories' && b.productType!=='Accessories') return -1;
      if (b.productType==='Accessories' && a.productType!=='Accessories') return 1;
      return 0;
    });
  }

  // Find max SKU count
  let maxSkus = 0;
  for (const skus of Object.values(orderMap)) {
    if (skus.length > maxSkus) maxSkus = skus.length;
  }

  // Sort orders: ones with same SKU sets together
  const orders = Object.keys(orderMap).sort(function(a,b){
    const sa = orderMap[a].map(function(s){return s.sku;}).join(',');
    const sb = orderMap[b].map(function(s){return s.sku;}).join(',');
    return sa.localeCompare(sb);
  });

  // Summary
  var allPrinted = orders.length > 0 && orders.every(function(on){ return printedSet[on]; });
  var waveColor = allPrinted ? '#16a34a' : 'var(--blue)';

  document.getElementById('summary-row').innerHTML =
    '<div class="summary-card"><div class="val" style="color:'+waveColor+';">'+waveNo+(allPrinted?' ✅':'')+'</div><div class="lbl">Wave No.</div></div>'+
    '<div class="summary-card"><div class="val">'+orderCount+'</div><div class="lbl">订单数</div></div>'+
    '<div class="summary-card"><div class="val">'+wm.totalQty+'</div><div class="lbl">总件数</div></div>'+
    '<div class="summary-card"><div class="val">'+maxSkus+'</div><div class="lbl">最多SKU列</div></div>';

  // Table header
  let html = '<table><thead><tr><th style="min-width:150px;">📋 订单号</th><th style="width:90px;">🖨️ 面单</th>';
  for (let i = 1; i <= maxSkus; i++) html += '<th>SKU'+i+'</th>';
  html += '</tr></thead><tbody>';

  // Type colors
  function typeBadge(pt) {
    var color = pt==='Accessories'?'#f59e0b':'#3b82f6';
    var bg = pt==='Accessories'?'#fef3c7':'#dbeafe';
    return '<span style="display:inline-block;background:'+bg+';color:'+color+';padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;">'+pt+'</span>';
  }

  for (const orderNo of orders) {
    const skus = orderMap[orderNo];
    const rowData = wm.rows.find(function(r){ return r.orderNo === orderNo; });
    const sheetUrl = (rowData && rowData.sheetUrl) || '';
    const hasLabel = !!labelCache[orderNo] || !!sheetUrl;
    const isPrinted = !!printedSet[orderNo];
    var btnStyle = isPrinted ? 'background:#16a34a;color:white;' : (hasLabel ? '' : 'background:#94a3b8;color:white;');
    var btnText = isPrinted ? '✅' : '🖨️';

    html += '<tr>'+
      '<td><div class="order-no" style="display:flex;align-items:center;gap:4px;"><span>'+orderNo+'</span><span class="copy-icon" onclick="event.stopPropagation();copyOrderNo(\''+orderNo+'\')" title="复制"></span></div></td>'+
      '<td><button class="btn '+(hasLabel&&!isPrinted?'btn-blue':'')+'" style="padding:6px 12px;font-size:12px;font-weight:700;'+btnStyle+'" onclick="printLabel(\''+orderNo+'\')">'+btnText+'</button></td>';

    for (let i = 0; i < maxSkus; i++) {
      if (i < skus.length) {
        const s = skus[i];
        const imgSrc = imageCache[s.sku] || 'https://api.swaner.vip/image/' + s.sku;
        const imgHtml = imgSrc
          ? '<img src="'+imgSrc+'" alt="'+s.sku+'" loading="lazy" onclick="event.stopPropagation();openLightbox(\''+imgSrc+'\')" style="width:70px;height:70px;object-fit:contain;border-radius:6px;border:1px solid #e2e8f0;cursor:zoom-in;">'
          : '<span style="font-size:10px;color:#94a3b8;">无图</span>';
        html += '<td><div class="sku-cell" style="padding:4px;">'+
          '<div class="sku-info" style="font-size:13px;">'+s.sku+'</div>'+
          imgHtml+
          '<div style="margin-top:4px;display:flex;flex-direction:column;align-items:center;gap:2px;">'+
            '<span style="font-weight:700;font-size:15px;">× '+s.qty+'</span>'+
            typeBadge(s.productType)+
          '</div>'+
          '</div></td>';
      } else {
        html += '<td></td>';
      }
    }
    html += '</tr>';
  }
  html += '</tbody></table>';

  document.getElementById('content-area').innerHTML = '<div class="order-grid">'+html+'</div>';
}

// ---- Barcode Scanner ----
function toggleScanner() {
  const area = document.getElementById('scan-area');
  if (area.classList.contains('hidden')) {
    area.classList.remove('hidden');
    startScanner();
    document.getElementById('btn-scan').textContent = '📷 关闭扫码';
  } else {
    area.classList.add('hidden');
    stopScanner();
    document.getElementById('btn-scan').textContent = '📷 扫码';
  }
}

function startScanner() {
  if (scanner) return;
  scanner = new Html5Qrcode("reader");
  scanner.start(
    {facingMode:"environment"},
    {fps:10, qrbox:{width:250, height:100}},
    (decodedText) => {
      document.getElementById('wave-input').value = decodedText;
      stopScanner();
      document.getElementById('scan-area').classList.add('hidden');
      document.getElementById('btn-scan').textContent = '📷 扫码';
      searchWave();
    },
    () => {} // ignore errors
  ).catch(err => {
    alert('摄像头启动失败: ' + err.message);
    scanner = null;
  });
}

function stopScanner() {
  if (scanner) {
    scanner.stop().then(() => { scanner = null; }).catch(() => { scanner = null; });
  }
}

function importStdImages(input) {
  const files = Array.from(input.files);
  if (files.length === 0) return;
  const productType = prompt('这些图片属于哪种类型？\n\n输入 Standard 或 Accessories', 'Standard');
  if (!productType || (productType !== 'Standard' && productType !== 'Accessories')) {
    alert('已取消。仅支持 Standard 或 Accessories 类型。');
    input.value = '';
    return;
  }
  let saved = 0;
  const promises = [];
  for (const f of files) {
    const name = f.name.replace(/\.[^.]+$/, '');
    imageCache[name] = URL.createObjectURL(f);
    skuTypes[name] = productType;
    promises.push(saveImageToDB(name, f, productType).then(() => { saved++; }));
  }
  Promise.all(promises).then(() => {
    document.getElementById('import-status').textContent =
      `💾 已导入 ${saved} 张 ${productType} SKU 图片到长期图库 (共 ${files.length} 张)`;
    if (currentWave) renderWave(currentWave);
  });
  input.value = '';
}

// ---- Label PDF Import ----
function importLabels(input) {
  const files = Array.from(input.files);
  if (files.length === 0) return;
  let loaded = 0;
  const total = files.length;
  for (const f of files) {
    const orderNo = f.name.replace(/\.pdf$/i, '').trim();
    // Pre-convert to data URL at upload time so print() works without async
    const reader = new FileReader();
    reader.onload = function(e) {
      const dataUrl = e.target.result;
      labelCache[orderNo] = dataUrl;

      // upload to WMS
      const base64 = dataUrl.split(',')[1] || '';
      fetch('/api/wms/upload-label', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          trackingNo: orderNo,
          fileBase64: base64,
          fileName: f.name,
          fileType: 'pdf'
        })
      }).then(r => r.json()).then(d => {
        console.log('Label uploaded:', orderNo, d);
      }).catch(err => {
        console.error('Label upload failed:', orderNo, err);
      });

      loaded++;
      if (loaded === total) {
        document.getElementById('import-status').textContent = `📮 已加载并上传 ${loaded} 张物流面单至WMS`;
        if (currentWave) renderWave(currentWave);
      }
    };
    reader.readAsDataURL(f);
  }
  input.value = '';
}

function resetPrinted() {
  printedSet = {}; savePrinted();
  if (currentWave) renderWave(currentWave);
}

// ---- WMS Integration ----
function checkProxy() {
  fetch('https://api.swaner.vip/health').then(function(r){
    if(r.ok){
      document.getElementById('proxy-status').textContent = '☁️ WMS已连接';
      document.getElementById('proxy-status').style.color = '#16a34a';
    }
  }).catch(function(){
    document.getElementById('proxy-status').textContent = '☁️ WMS离线';
    document.getElementById('proxy-status').style.color = '#94a3b8';
  });
}
checkProxy(); setInterval(checkProxy, 30000);

function loadFromWMS() {
  // 直接触发智能查询（自动从 WMS 加载）
  searchWave();
}

function copyOrderNo(orderNo) {
  navigator.clipboard.writeText(orderNo).then(function(){
    var toast = document.createElement('div');
    toast.className = 'copy-toast';
    toast.textContent = '已复制: ' + orderNo;
    document.body.appendChild(toast);
    setTimeout(function(){ toast.classList.add('show'); }, 10);
    setTimeout(function(){ toast.classList.remove('show'); setTimeout(function(){ toast.remove(); }, 300); }, 1200);
  });
}

function printLabel(orderNo) {
  var dataUrl = labelCache[orderNo];

  // No cached label — try sheetUrl from WMS data
  if (!dataUrl) {
    var row = allRows.find(function(r){ return r.orderNo === orderNo && r.sheetUrl; });
    if (row && row.sheetUrl) {
      // Directly open WMS sheetUrl (COS signed URL — accessible from browser)
      var w = window.open(row.sheetUrl, '_blank');
      if (!w) { alert('请允许弹出窗口以打开面单'); return; }
      printedSet[orderNo] = true; savePrinted(); renderWave(currentWave);
      return;
    }
    alert('未找到订单 ' + orderNo + ' 的面单');
    return;
  }

  // Cached local label (legacy)
  var w = window.open('', '_blank', 'width=900,height=700');
  if (!w) { alert('请允许弹出窗口'); return; }
  w.document.title = orderNo + ' — 物流面单';
  w.document.body.style.cssText = 'margin:0;padding:0;overflow:hidden;background:#525659;';
  w.document.body.innerHTML = '<embed src="' + dataUrl + '" type="application/pdf" width="100%" height="100%" style="border:none;position:fixed;top:0;left:0;width:100vw;height:100vh;">';
  printedSet[orderNo] = true; savePrinted(); renderWave(currentWave);
}

async function clearImageDB() {
  if (!confirm('确认清除图库数据库？\n\n这将删除所有 Standard 和 Accessories 的持久化图片缓存。\n下次需要重新上传这些图片。\n\nCustomization 图片不受影响（不会存入数据库）。')) return;
  await clearDB();
  // Also clear current imageCache for persisted items (keep customization uploads)
  for (const sku of Object.keys(skuTypes)) {
    const pt = skuTypes[sku];
    if (pt === 'Standard' || pt === 'Accessories') {
      if (imageCache[sku]) URL.revokeObjectURL(imageCache[sku]);
      delete imageCache[sku];
    }
  }
  document.getElementById('import-status').textContent = '🗑️ 图库已清除，请重新上传 Standard/Accessories 图片';
  if (currentWave) renderWave(currentWave);
}

// ---- Template Download ----
function downloadTemplate() {
  if (typeof XLSX === 'undefined') {
    alert('Excel 库未加载，请检查网络后刷新页面。');
    return;
  }
  // Build template worksheet
  const templateData = [
    ['Outbound Order No./出库单号', 'Wave No./关联波次号', 'Tracking No./快递单号', 'SKU', 'Outbound Qty/出库数量', 'Product Type/产品分类'],
    ['OBS0012605210RZ', 'W260521C66', 'GFUS01052328742144', 'YourSKU001', '12', 'Accessories'],
    ['OBS0192605210T9', 'W260521C66', 'GFUS01052328035393', 'YourSKU002', '1', 'Standard'],
    ['OBS0192605210T9', 'W260521C66', 'GFUS01052328035393', 'YourSKU003', '1', 'Customization'],
  ];
  const ws = XLSX.utils.aoa_to_sheet(templateData);
  // Set column widths
  ws['!cols'] = [
    {wch: 28}, {wch: 22}, {wch: 28}, {wch: 22}, {wch: 22}, {wch: 18}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.writeFile(wb, 'POD_Wave_Import_Template.xlsx');
}

// Init DB on page load
openDB().then(() => console.log('IndexedDB ready'));
</script>

<script>
/* === Image Management Center === */
var IMG_API = "https://api.swaner.vip/image";
var imgSelectedForDelete = {};

function openImgPanel() {
  document.getElementById("img-panel-overlay").classList.add("active");
  switchImgTab("tab-img-upload-std");
}
document.addEventListener("DOMContentLoaded", function() {
  var panel = document.getElementById("img-panel-overlay");
  if (panel) panel.addEventListener("click", function(e) { if (e.target === this) this.classList.remove("active"); });
});

function switchImgTab(tabId, btn) {
  var tabs = document.querySelectorAll("#img-panel-overlay .tab-content");
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
  document.getElementById(tabId).classList.add("active");
  var btns = document.querySelectorAll("#img-panel-overlay .sku-panel-tabs button");
  for (var j = 0; j < btns.length; j++) btns[j].classList.remove("active");
  if (btn) btn.classList.add("active");
  if (tabId === "tab-img-overview") renderImgOverview();
  if (tabId === "tab-img-delete") renderImgDeleteTable();
}

/* === Upload === */
function setupImgDrop(zoneId, inputId) {
  var zone = document.getElementById(zoneId);
  zone.addEventListener("click", function() { document.getElementById(inputId).click(); });
  zone.addEventListener("dragover", function(e) { e.preventDefault(); zone.style.background = "#f0f4ff"; });
  zone.addEventListener("dragleave", function() { zone.style.background = ""; });
  zone.addEventListener("drop", function(e) {
    e.preventDefault(); zone.style.background = "";
    var files = e.dataTransfer.files;
    processImageFiles(files, document.getElementById(inputId).dataset.pt || "Standard");
  });
}

document.addEventListener("DOMContentLoaded", function() {
  if (document.getElementById("img-drop-std")) {
    setupImgDrop("img-drop-std", "img-input-std");
    setupImgDrop("img-drop-cust", "img-input-cust");
  }
});

async function uploadImages(input, defaultType) {
  var files = input.files;
  if (!files.length) return;
  var productType = defaultType;
  var statusId = defaultType === "Accessories" ? "img-upload-cust-status" : "img-upload-std-status";
  var status = document.getElementById(statusId);

  // Build images array (batch upload)
  var images = [];
  status.textContent = "读取 " + files.length + " 个文件中...";
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    var sku = f.name.replace(/\.[^.]+$/, "");
    try {
      var base64 = await fileToBase64(f);
      images.push({ sku: sku, image: base64, productType: productType, fileType: f.name.split(".").pop() });
      // Also keep in-memory cache + persist to IndexedDB
      imageCache[sku] = URL.createObjectURL(f);
      if (!skuTypes[sku]) skuTypes[sku] = productType;
      saveImageToDB(sku, f, productType).catch(function(){});
    } catch(e) {
      images.push({ sku: sku, image: "", productType: productType, error: "read failed: " + e.message });
    }
  }

  // Batch upload to server
  status.textContent = "上传 " + images.length + " 张到服务器...";
  try {
    var r = await fetch(IMG_API + "/upload", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ images: images })
    });
    var d = await r.json();

    // Build detailed status
    var okCount = d.ok_count || 0;
    var failCount = d.fail_count || 0;
    var results = d.results || [];
    var html = '<b>完成! 成功 ' + okCount + ' 张, 失败 ' + failCount + ' 张</b>';
    if (results.length > 0) {
      var newCount = 0, updateCount = 0;
      for (var j = 0; j < results.length; j++) {
        if (results[j].ok && results[j].status === 'new') newCount++;
        if (results[j].ok && results[j].status === 'updated') updateCount++;
      }
      if (updateCount > 0) html += ' · <span style="color:#f59e0b;">已覆盖 ' + updateCount + ' 张</span>';
      if (newCount > 0) html += ' · <span style="color:#16a34a;">新增 ' + newCount + ' 张</span>';
      if (failCount > 0) {
        html += '<div style="margin-top:8px;max-height:120px;overflow-y:auto;font-size:11px;">';
        html += '<table style="width:100%;font-size:11px;"><tr><th>SKU</th><th>错误原因</th></tr>';
        for (var j = 0; j < results.length; j++) {
        if (!results[j].ok) {
          html += '<tr><td><code>' + results[j].sku + '</code></td><td style="color:#dc2626;">' + (results[j].error || "unknown") + '</td></tr>';
        }
      }
      html += '</table></div>';
      }
    }
    status.innerHTML = html;
  } catch(e) {
    status.innerHTML = '<b style="color:#dc2626;">上传失败: ' + e.message + '</b>';
  }
  input.value = "";
  if (currentWave) renderWave(currentWave);
}

function fileToBase64(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() {
      var base64 = reader.result.split(",")[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* === Overview === */
async function renderImgOverview() {
  var r = await fetch(IMG_API + "/overview?_t=" + Date.now());
  var d = await r.json();
  var data = d.data;

  // Merge has_list + missing_list — overview shows ALL uploaded SKUs
  var hasList = (data.has_list || []).map(function(x) { x.hasImg = true; return x; });
  var missList = (data.missing_list || []).map(function(x) { x.hasImg = false; return x; });
  var allSkus = hasList.concat(missList);
  // Sort: with images first, then by SKU
  allSkus.sort(function(a,b) {
    if (a.hasImg !== b.hasImg) return a.hasImg ? -1 : 1;
    return a.sku.localeCompare(b.sku);
  });

  document.getElementById("img-ov-total").textContent = allSkus.length;
  var productCount = 0, accCount = 0;
  allSkus.forEach(function(x) { if (x.productType === 'Accessories') accCount++; else productCount++; });
  document.getElementById("img-ov-product").textContent = productCount;
  document.getElementById("img-ov-accessories").textContent = accCount;

  var typeFilter = document.getElementById("img-ov-type").value;
  var skuFilter = (document.getElementById("img-ov-sku").value || "").toLowerCase();
  var dateFilter = document.getElementById("img-ov-date").value;
  var list = allSkus;
  if (typeFilter) list = list.filter(function(x) { return x.productType === typeFilter; });
  if (skuFilter) list = list.filter(function(x) { return x.sku.toLowerCase().indexOf(skuFilter) !== -1; });
  if (dateFilter) list = list.filter(function(x) { return x.maintainDate >= dateFilter; });

  document.getElementById("img-ov-count").textContent = list.length + " 条";
  var tbody = document.getElementById("img-ov-tbody");
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">无数据</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(function(x) {
    var statusHtml = x.hasImg ? '<span style="color:#16a34a;">✅ 有图</span>' : '<span style="color:#dc2626;">❌ 缺图</span>';
    return '<tr><td><code>' + x.sku + '</code></td><td><span class="sku-badge ' + x.productType + '">' + x.productType + '</span></td><td>' + (x.maintainDate || '-') + '</td><td>' + statusHtml + '</td></tr>';
  }).join("");
}



/* === Delete === */
// Delete tab uses the SAME data as Overview (/image/overview)
var imgSelectedForDelete = {};
function toggleAllImgDel(cb) {
  var cbs = document.querySelectorAll("#img-del-tbody input[type=checkbox]");
  for (var i = 0; i < cbs.length; i++) {
    cbs[i].checked = cb.checked;
    var sku = cbs[i].closest("tr").querySelector("code").textContent;
    if (cb.checked) imgSelectedForDelete[sku] = true; else delete imgSelectedForDelete[sku];
  }
}
function toggleImgDel(sku, checked) {
  if (checked) imgSelectedForDelete[sku] = true; else delete imgSelectedForDelete[sku];
}

async function renderImgDeleteTable() {
  var r = await fetch(IMG_API + "/overview?_t=" + Date.now());
  var d = await r.json();
  var data = d.data;

  // Same merged list as overview
  var hasList = (data.has_list || []).map(function(x) { x.hasImg = true; return x; });
  var missList = (data.missing_list || []).map(function(x) { x.hasImg = false; return x; });
  var allSkus = hasList.concat(missList);
  allSkus.sort(function(a,b) {
    if (a.hasImg !== b.hasImg) return a.hasImg ? -1 : 1;
    return a.sku.localeCompare(b.sku);
  });

  var typeFilter = document.getElementById("img-del-type").value;
  var search = (document.getElementById("img-del-search").value || "").toLowerCase();
  var list = allSkus;
  if (typeFilter) list = list.filter(function(x) { return x.productType === typeFilter; });
  if (search) list = list.filter(function(x) { return x.sku.toLowerCase().indexOf(search) !== -1; });

  document.getElementById("img-del-count").textContent = list.length + " 条";
  imgSelectedForDelete = {};
  document.getElementById("img-del-select-all").checked = false;
  var tbody = document.getElementById("img-del-tbody");
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">无SKU数据</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(function(x) {
    var statusHtml = x.hasImg ? '<span style="color:#16a34a;">✅ 有图</span>' : '<span style="color:#dc2626;">❌ 缺图</span>';
    return '<tr><td><input type="checkbox" onchange="toggleImgDel(\'' + x.sku + '\',this.checked)"></td><td><code>' + x.sku + '</code></td><td><span class="sku-badge ' + x.productType + '">' + x.productType + '</span></td><td>' + (x.maintainDate || '-') + '</td><td>' + statusHtml + '</td></tr>';
  }).join("");
}

async function batchDeleteImages() {
  var list = Object.keys(imgSelectedForDelete);
  if (list.length === 0) { alert("请先勾选要删除的SKU"); return; }
  if (!confirm("确认删除 " + list.length + " 个SKU及其图片？\n\n此操作不可恢复。")) return;
  // Use GET to bypass Cloudflare WAF
  var r = await fetch(IMG_API + "/remove?skus=" + encodeURIComponent(list.join(",")));
  var d = await r.json();
  alert("已删除 " + (d.deleted || 0) + " 个");
  // Refresh both: delete table AND overview (they're linked)
  renderImgDeleteTable();
  renderImgOverview();
}
